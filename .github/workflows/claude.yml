name: Claude

# Interactive engineering agent. Mention @claude in an issue or PR comment
# (from anywhere, including the GitHub phone app) and Claude picks up the
# work, implements it on a branch, and opens a PR you review.

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # line above and use this instead (zero API spend, runs on your sub):
